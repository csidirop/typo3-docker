<VirtualHost *:80>
    DocumentRoot /var/www/typo3/public

    UseCanonicalName On

    <Directory /var/www/typo3/public>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>